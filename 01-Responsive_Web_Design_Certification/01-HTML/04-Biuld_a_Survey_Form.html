<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
</head>

<body>
    <h1 id="title">title</h1>
    <p id="description">a short explanation</p>
    <form id="survey-form">
        <label for="name" id="name-label">name</label>
        <input id="name" type="text" placeholder="name" required>
        <br>
        <label for="email" id="email-label">email</label>
        <input id="email" type="email" placeholder="email@email.com" required>
        <br>
        <label for="number" id="number-label">number</label>
        <input id="number" type="number" min="1" max="99" placeholder="1">
        <br>
        <select id="dropdown">
            <option value="choose #1">choose #1</option>
            <option value="choose #2">choose #2</option>
        </select>
        <br>
        <p>Option Yes or No</p>
        <label for="yes-option">Yes</label>
        <input id="yes-option" type="radio" name="radio" value="yes" />
        <label for="no-option">No</label>
        <input id="no-option" type="radio" name="radio" value="no" />
        <br>
        <label for="checkbox 1">checkbox 1</label>
        <input id="checkbox 1" type="checkbox" value="checkbox 1">
        <br>
        <label for="checkbox 2">checkbox 2</label>
        <input id="checkbox 2" type="checkbox" value="checkbox 2">
        <br>
        <label for="comment">Additional comments</label>
        <textarea placeholder="Additional comments"></textarea>
        <button id="submit" type="submit">Submit</button>
    </form>
</body>

</html>
