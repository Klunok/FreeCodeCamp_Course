<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Business Card</title>
    <link rel="stylesheet" href="03-Design_a_Business_Card.css">
</head>

<body>
    <div class="business-card">
        <img class="profile-image" src="https://cdn.freecodecamp.org/curriculum/labs/flower.jpg" alt="profile-image">
        <p class="full-name">your name</p>
        <p class="designation">your designation</p>
        <p class="company">company name</p>
        <hr>
        <p>Email_address_as_the_text@mail.com</p>
        <p>Text a phone number: +0 000 000 000</p>
        <a class="portfolio-link" href="https://github.com/Klunok/FreeCodeCamp_Course.git">Portfolio</a>
        <hr>
        <div class="social-media">
            <h2>Connect with me</h2>
            <a href="twitter.com">Twitter</a>
            <a href="linkedin.com">LinkedIn</a>
            <a href="GitHub.com">GitHub</a>
        </div>
    </div>

</body>

</html>
